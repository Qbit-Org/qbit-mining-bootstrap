      # High-diff listener host mapping. The default publishes an ephemeral
      # loopback port so deployments that leave the listener disabled never
      # occupy host 4334; set PRISM_STRATUM_HIGHDIFF_PORT_HOST (e.g. 4334)
      # together with PRISM_STRATUM_HIGHDIFF_PORT when enabling it.
      - "${PRISM_STRATUM_HIGHDIFF_PORT_HOST:-127.0.0.1:0}:${PRISM_STRATUM_HIGHDIFF_PORT:-4334}"
