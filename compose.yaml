      test:
        - CMD-SHELL
        - >-
          python3 -c "import os, socket, urllib.request; p=int(os.environ.get('PRISM_STRATUM_PORT','3340')); s=socket.create_connection(('127.0.0.1', p), 2); s.close(); ap=int(os.environ.get('PRISM_AUDIT_PORT','0') or '0'); h=os.environ.get('PRISM_AUDIT_BIND','127.0.0.1') or '127.0.0.1'; h='127.0.0.1' if h in ('0.0.0.0','::') else h; assert not ap or urllib.request.urlopen(f'http://{h}:{ap}/healthz', timeout=2).status == 200"
      interval: 5s
      timeout: 5s
      retries: 30

