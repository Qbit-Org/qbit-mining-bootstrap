name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Lint, compile, and test
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Check shell syntax
        run: git ls-files '*.sh' | xargs bash -n

      - name: ShellCheck shell scripts
        run: |
          touch .env
          cp config/upstream.env.example config/upstream.env
          git ls-files '*.sh' | xargs shellcheck -x

      - name: Compile Python sources
        run: python -m compileall -q docker lab tests examples

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Validate Docker Compose files
        run: |
          docker compose \
            --env-file config/upstream.env.example \
            --env-file .env.example \
            -f compose.yaml \
            --profile permissionless \
            --profile permissionless-real \
            --profile auxpow \
            config --quiet

  docker-builds:
    name: Build lightweight Docker images
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Blacksmith Docker builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Create qbit functional-test build context
        run: mkdir -p /tmp/qbit-functional-fixture/test/functional

      - name: Build miner simulator image
        run: docker build -f lab/miner-sim/Dockerfile .

      - name: Build AuxPoW coordinator image
        run: |
          docker buildx build \
            --build-context qbit-src=/tmp/qbit-functional-fixture \
            --load \
            -f lab/auxpow/Dockerfile \
            .
